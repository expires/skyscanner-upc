<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      min-height: 200px;
      max-height: 580px;
      font-family: 'Skyscanner Relative', -apple-system, BlinkMacSystemFont, 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
      background: #EFF3F8;
      color: #161616;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: #C1C7CF;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover { background: #9aa0a8; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #05203C;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-brand {
      display: flex;
      flex-direction: column;
    }

    .header-brand h1 {
      font-size: 17px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.3px;
    }

    .header-badge {
      font-size: 9px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.02em;
    }

    .tabs { display: flex; gap: 4px; }

    .tab {
      background: rgba(255,255,255,0.1);
      border: none;
      color: rgba(255,255,255,0.65);
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .tab:hover { background: rgba(255,255,255,0.18); color: #fff; }

    .tab.active {
      background: #0062E3;
      color: #FFFFFF;
    }

    /* Views */
    .view { display: none; }
    .view.active { display: block; }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #626971;
    }

    .empty-state p {
      font-size: 14px;
      line-height: 1.6;
    }

    /* Feed */
    .feed {
      max-height: 500px;
      overflow-y: auto;
      padding: 8px;
    }

    .feed-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      background: #FFFFFF;
      border-radius: 12px;
      margin-bottom: 6px;
      box-shadow: 0px 1px 3px 0px rgba(37,32,31,.08);
      transition: box-shadow 0.15s;
      position: relative;
    }

    .feed-item:hover {
      box-shadow: 0px 4px 14px 0px rgba(37,32,31,.12);
    }

    .feed-item:last-child { margin-bottom: 0; }

    .feed-flag {
      font-size: 28px;
      line-height: 1;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .feed-info {
      flex: 1;
      min-width: 0;
    }

    .feed-dest {
      font-size: 15px;
      font-weight: 700;
      color: #05203C;
      letter-spacing: -0.02em;
    }

    .feed-meta {
      font-size: 12px;
      color: #626971;
      margin-top: 2px;
    }

    .source-link {
      display: inline-flex;
      vertical-align: middle;
      margin-left: 4px;
      color: #626971;
      transition: color 0.15s;
    }

    .source-link:hover { color: #0062E3; }

    .source-icon {
      width: 12px;
      height: 12px;
    }

    .feed-vibes {
      display: none;
      gap: 4px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .feed-vibes.expanded { display: flex; }

    .vibe-tag {
      background: #E3F0FF;
      color: #0062E3;
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .vibes-toggle {
      background: none;
      border: none;
      color: #626971;
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      margin-left: 4px;
      font-family: inherit;
    }

    .vibes-toggle:hover { color: #0062E3; }

    /* Tag search */
    .tag-search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 8px 0;
    }

    .tag-search-input {
      flex: 1;
      background: #FFFFFF;
      border: 1px solid #C1C7CF;
      border-radius: 8px;
      padding: 8px 10px;
      color: #161616;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .tag-search-input:focus { border-color: #0062E3; box-shadow: 0 0 0 2px rgba(0,98,227,0.15); }

    .tag-search-input::placeholder { color: #9aa0a8; }

    .active-filter {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 8px 0;
    }

    .active-filter.visible { display: flex; }

    .filter-tag {
      background: #E3F0FF;
      color: #0062E3;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .filter-clear {
      background: none;
      border: none;
      color: #0062E3;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      line-height: 1;
    }

    .filter-clear:hover { color: #05203C; }

    .tag-suggestions {
      display: none;
      flex-wrap: wrap;
      gap: 4px;
      padding: 6px 8px 0;
    }

    .tag-suggestions.visible { display: flex; }

    .tag-suggestion {
      background: #FFFFFF;
      color: #626971;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid #E0E4E9;
      transition: all 0.15s;
      font-family: inherit;
    }

    .tag-suggestion:hover {
      color: #0062E3;
      border-color: #0062E3;
      background: #E3F0FF;
    }

    /* Right side: price + save inline */
    .feed-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }

    .feed-price-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .feed-price-link {
      text-decoration: none;
      background: #05203C;
      border-radius: 8px;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s;
    }

    .feed-price-link:hover {
      background: #154679;
    }

    .feed-price {
      font-size: 14px;
      font-weight: 700;
      color: #FFFFFF;
    }

    .feed-currency {
      font-size: 10px;
      color: rgba(255,255,255,0.7);
    }

    .feed-arrow {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
    }

    .feed-save {
      background: none;
      border: 1px solid #C1C7CF;
      color: #626971;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .feed-save:hover {
      border-color: #0062E3;
      color: #0062E3;
    }

    .feed-save.saved {
      background: #E3F0FF;
      border-color: #0062E3;
      color: #0062E3;
    }

    .feed-airline {
      font-size: 11px;
      color: #626971;
      text-align: right;
    }

    /* Loading bar */
    .feed-loading {
      position: absolute;
      bottom: 0;
      left: 12px;
      right: 12px;
      height: 2px;
      background: #E0E4E9;
      overflow: hidden;
      border-radius: 1px;
    }

    .feed-loading-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, transparent, #0062E3, transparent);
      animation: loading-slide 1.2s ease-in-out infinite;
    }

    @keyframes loading-slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* Wishlist */
    .wishlist-list {
      max-height: 500px;
      overflow-y: auto;
      padding: 8px;
    }

    .wishlist-remove {
      background: none;
      border: 1px solid #C1C7CF;
      color: #626971;
      cursor: pointer;
      font-size: 14px;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .wishlist-remove:hover {
      border-color: #E70866;
      color: #E70866;
    }

    /* Settings */
    .settings-view { padding: 16px; }

    .settings-view label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #626971;
      margin-bottom: 4px;
      margin-top: 14px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .settings-view label:first-child { margin-top: 0; }

    .settings-view input, .settings-view select {
      width: 100%;
      padding: 10px;
      background: #FFFFFF;
      border: 1px solid #C1C7CF;
      border-radius: 8px;
      color: #161616;
      font-size: 13px;
      font-family: 'SF Mono', Menlo, monospace;
      transition: border-color 0.2s;
    }

    .settings-view input:focus, .settings-view select:focus {
      outline: none;
      border-color: #0062E3;
      box-shadow: 0 0 0 2px rgba(0,98,227,0.15);
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.2s;
      font-family: inherit;
    }

    .btn-primary {
      background: #05203C;
      color: #FFFFFF;
    }

    .btn-primary:hover { background: #154679; }

    .settings-status {
      font-size: 12px;
      font-weight: 700;
      color: #0C838A;
      margin-top: 12px;
      display: none;
    }

    .feed-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px 0;
    }

    .feed-count {
      font-size: 12px;
      color: #626971;
      font-weight: 700;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #626971;
      font-size: 12px;
      cursor: pointer;
      font-weight: 700;
      font-family: inherit;
    }

    .clear-btn:hover { color: #E70866; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-brand">
      <h1>Roam</h1>
      <span class="header-badge">powered by Skyscanner</span>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="feed">Feed</button>
      <button class="tab" data-tab="saved">Saved</button>
      <button class="tab" data-tab="settings">Settings</button>
    </div>
  </div>

  <!-- Feed -->
  <div id="view-feed" class="view active">
    <div id="feed-empty" class="empty-state">
      <p>Scroll TikTok or Instagram<br/>and Roam will detect travel destinations.</p>
    </div>
    <div id="feed-toolbar" class="feed-toolbar" style="display:none;">
      <span id="feed-count" class="feed-count"></span>
      <button id="feed-clear" class="clear-btn">Clear all</button>
    </div>
    <div class="tag-search-bar">
      <input id="tag-search" class="tag-search-input" type="text" placeholder="Search by mood or tag..." />
    </div>
    <div id="tag-suggestions" class="tag-suggestions"></div>
    <div id="active-filter" class="active-filter">
      <span id="filter-label" class="filter-tag">
        <span id="filter-text"></span>
        <button id="filter-clear" class="filter-clear">&times;</button>
      </span>
    </div>
    <div id="feed-list" class="feed"></div>
  </div>

  <!-- Saved -->
  <div id="view-saved" class="view">
    <div id="saved-empty" class="empty-state">
      <p>No saved destinations yet.</p>
    </div>
    <div id="saved-list" class="wishlist-list"></div>
  </div>

  <!-- Settings -->
  <div id="view-settings" class="view settings-view">
    <label for="input-anthropic">Anthropic API Key</label>
    <input id="input-anthropic" type="password" placeholder="sk-ant-..." />

    <label for="input-skyscanner">Skyscanner API Key</label>
    <input id="input-skyscanner" type="password" placeholder="API key from hackathon" />

    <label for="input-airport">Home Airport (IATA)</label>
    <input id="input-airport" type="text" placeholder="BCN" maxlength="3" style="text-transform:uppercase;" />

    <label for="input-currency">Currency</label>
    <select id="input-currency">
      <option value="EUR">EUR — Euro</option>
      <option value="GBP">GBP — British Pound</option>
      <option value="USD">USD — US Dollar</option>
      <option value="CAD">CAD — Canadian Dollar</option>
      <option value="AUD">AUD — Australian Dollar</option>
      <option value="JPY">JPY — Japanese Yen</option>
      <option value="CHF">CHF — Swiss Franc</option>
      <option value="SEK">SEK — Swedish Krona</option>
      <option value="NOK">NOK — Norwegian Krone</option>
      <option value="DKK">DKK — Danish Krone</option>
      <option value="PLN">PLN — Polish Zloty</option>
      <option value="INR">INR — Indian Rupee</option>
      <option value="THB">THB — Thai Baht</option>
      <option value="BRL">BRL — Brazilian Real</option>
      <option value="MXN">MXN — Mexican Peso</option>
      <option value="SGD">SGD — Singapore Dollar</option>
      <option value="NZD">NZD — New Zealand Dollar</option>
    </select>

    <button id="btn-save-settings" class="btn btn-primary">Save Settings</button>
    <div id="settings-status" class="settings-status">Settings saved.</div>
  </div>

  <script src="dist/popup.js" type="module"></script>
</body>
</html>
